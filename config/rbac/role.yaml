---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - secret.kkato.app
  resources:
  - passwords
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - secret.kkato.app
  resources:
  - passwords/finalizers
  verbs:
  - update
- apiGroups:
  - secret.kkato.app
  resources:
  - passwords/status
  verbs:
  - get
  - patch
  - update
